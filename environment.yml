# Conda environment that includes the CAD kernel (OpenCascade via cadquery).
# This is the supported way to get /generate working.
#
#   conda env create -f environment.yml
#   conda activate lee3d
#   uvicorn app.main:app --reload --port 8000
name: lee3d
channels:
  - conda-forge
dependencies:
  - python=3.11
  - cadquery=2.4
  - pip
  - pip:
      - fastapi==0.111.0
      - "uvicorn[standard]==0.30.1"
      - python-multipart==0.0.9
      - pydantic==2.7.4
      - httpx==0.27.0
      - python-dotenv==1.0.1
      - opencv-python-headless==4.10.0.84
      - numpy==1.26.4
      - pymupdf==1.24.7
